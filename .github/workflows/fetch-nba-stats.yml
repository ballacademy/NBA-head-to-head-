name: Fetch NBA Player Stats

on:
  workflow_dispatch:
    inputs:
      season:
        description: NBA season (YYYY-YY)
        required: true
        default: "2025-26"
      season_type:
        description: Season type
        required: true
        default: Regular Season
        type: choice
        options:
          - Regular Season
          - Playoffs
          - Pre Season

permissions:
  contents: write

jobs:
  fetch-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r scripts/requirements.txt

      - name: Fetch player stats
        run: |
          python scripts/fetch_nba_player_stats.py \
            --season "${{ inputs.season }}" \
            --season-type "${{ inputs.season_type }}" \
            --timeout 120

      - name: Commit updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/nba-stats/
          if git diff --staged --quiet; then
            echo "No stat file changes to commit."
          else
            git commit -m "chore: refresh NBA player stats (${{ inputs.season }})"
            git push
          fi
